apiVersion: apps/v1
kind: Deployment
metadata:
  name: heimdall
spec:
  replicas: 1  
  selector:
    matchLabels:
      app: heimdall  
  template:
    metadata:
      labels:
        app: heimdall
    spec:
      containers:
        - name: heimdall
          image: linuxserver/heimdall  
          ports:
            - containerPort: 80  
          env:
            - name: PUID
              value: "1000" 
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Warsaw"  
          volumeMounts:
            - name: config-volume
              mountPath: /config 
      volumes:
        - name: config-volume
          hostPath:
            path: /root/user/heimdall-config
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: heimdall-service
spec:
  type: NodePort
  selector:
    app: heimdall
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31881
